<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>의회문서 OCR 테스트</title>
  <style>
    body { font-family: sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.25rem; }
    form { display: flex; flex-direction: column; gap: 1rem; }
    .upload-zone { border: 2px dashed #ccc; border-radius: 8px; padding: 2rem; text-align: center; cursor: pointer; transition: border-color 0.2s, background 0.2s; }
    .upload-zone:hover { border-color: #06c; background: #f8fbff; }
    .upload-zone.dragover { border-color: #06c; background: #e6f2ff; }
    .upload-zone .upload-hint { color: #666; font-size: 0.9rem; }
    .upload-zone .upload-filename { color: #06c; font-size: 0.9rem; margin-top: 0.5rem; }
    input[type="file"] { display: none; }
    button { padding: 0.5rem 1rem; cursor: pointer; }
    .elapsed { margin-top: 1rem; font-size: 0.9rem; color: #666; }
    .pages-wrap { display: flex; flex-direction: column; gap: 0.5rem; margin-top: 1rem; }
    .pages-wrap.hidden { display: none; }
    .result-toolbar { display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; flex-wrap: wrap; }
    .view-toggle { display: flex; gap: 0; border: 1px solid #ccc; border-radius: 4px; overflow: hidden; }
    .toggle-btn { padding: 0.4rem 0.75rem; border: none; background: #fff; color: #666; cursor: pointer; font-size: 0.9rem; }
    .toggle-btn:hover { background: #f0f0f0; }
    .toggle-btn.active { background: #06c; color: #fff; }
    .pages-label { font-size: 0.9rem; color: #666; margin: 0; }
    .copy-btn { padding: 0.4rem 0.75rem; border: 1px solid #06c; background: #fff; color: #06c; border-radius: 4px; cursor: pointer; font-size: 0.9rem; }
    .copy-btn:hover { background: #e6f2ff; }
    .page-tabs { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .page-tabs.hidden { display: none; }
    .page-tab { padding: 0.4rem 0.75rem; border: 1px solid #ccc; background: #fff; border-radius: 4px; cursor: pointer; font-size: 0.9rem; }
    .page-tab:hover { background: #f0f0f0; }
    .page-tab.active { background: #06c; color: #fff; border-color: #06c; }
    #result { margin-top: 0.5rem; white-space: pre-wrap; background: #f5f5f5; padding: 1rem; border-radius: 4px; min-height: 4rem; width: 100%; box-sizing: border-box; }
    #result.diff-view { font-family: monospace; font-size: 0.9rem; line-height: 1.5; word-break: break-all; }
    .error { color: #c00; }
    .hidden { display: none; }
    a { color: #06c; }
    .test-mode-row { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
    .toggle-label { display: flex; align-items: center; gap: 0.5rem; cursor: pointer; font-size: 0.95rem; }
    .toggle-label input { width: 1.1rem; height: 1.1rem; }
    .test-mode-hint { font-size: 0.8rem; color: #888; }
    #test-result-wrap { margin-top: 1rem; padding: 1rem; background: #f0f7ff; border-radius: 8px; border: 1px solid #cce; }
    #test-result-wrap.hidden { display: none; }
    .test-result-title { font-weight: 600; margin-bottom: 0.5rem; font-size: 0.95rem; }
    .accuracy-row { display: flex; gap: 1.5rem; flex-wrap: wrap; margin-bottom: 0.75rem; }
    .accuracy-item { font-size: 0.9rem; }
    .accuracy-item span.value { font-weight: 600; color: #06c; }
    .test-result-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.5rem; align-items: center; }
    .test-view-toggle { display: flex; gap: 0; border: 1px solid #ccc; border-radius: 4px; overflow: hidden; }
    .test-view-btn { padding: 0.35rem 0.6rem; border: none; background: #fff; color: #666; cursor: pointer; font-size: 0.85rem; }
    .test-view-btn:hover { background: #f0f0f0; }
    .test-view-btn.active { background: #06c; color: #fff; }
    .copy-diff-btn { padding: 0.4rem 0.75rem; border: 1px solid #086; background: #fff; color: #086; border-radius: 4px; cursor: pointer; font-size: 0.9rem; }
    .copy-diff-btn:hover { background: #e6f7ed; }
    .diff-block { white-space: pre-wrap; font-family: monospace; font-size: 0.85rem; line-height: 1.5; background: #fff; padding: 0.75rem; border-radius: 4px; max-height: 14rem; overflow: auto; margin-top: 0.5rem; word-break: break-all; }
    .diff-legend { font-size: 0.75rem; color: #666; margin-bottom: 0.35rem; }
    .diff-color-legend { display: flex; flex-wrap: wrap; gap: 0.75rem 1.25rem; font-size: 0.8rem; color: #444; margin-bottom: 0.5rem; }
    .diff-color-legend .item { display: flex; align-items: center; gap: 0.35rem; }
    .diff-color-legend .sample { padding: 0.1rem 0.35rem; border-radius: 2px; font-weight: 600; }
    .diff-color-legend .sample.equal { color: #333; background: #eee; }
    .diff-color-legend .sample.direct { color: #086; background: #e6f7ed; }
    .diff-color-legend .sample.ocr { color: #c00; text-decoration: line-through; background: #ffe6e6; }
    .diff-equal { color: #333; }
    .diff-direct { color: #086; background: #e6f7ed; }
    .diff-ocr { color: #c00; text-decoration: line-through; background: #ffe6e6; }
    .diff-insert { color: #c00; text-decoration: line-through; background: #ffe6e6; }
    .diff-delete { color: #086; background: #e6f7ed; }
    .page-source-badge { font-size: 0.8rem; color: #666; margin-bottom: 0.35rem; }
    .page-source-badge.direct { color: #086; }
    .page-source-badge.ocr { color: #06c; }
  </style>
</head>
<body>
  <h1>의회문서 OCR</h1>
  <form id="form">
    <div id="upload-zone" class="upload-zone">
      <p class="upload-hint" id="upload-hint">PDF를 여기에 놓거나 클릭하여 선택</p>
      <p class="upload-filename hidden" id="upload-filename"></p>
      <input type="file" name="file" id="file-input" accept=".pdf">
    </div>
    <div class="test-mode-row">
      <label class="toggle-label">
        <input type="checkbox" id="test-mode-toggle" name="test_mode">
        <span class="toggle-text">테스트 모드</span>
      </label>
      <span class="test-mode-hint" id="test-mode-hint">direct 추출 가능 PDF일 때만 diff·정확도 표시</span>
    </div>
    <button type="submit">텍스트 추출</button>
  </form>
  <div id="elapsed" class="elapsed"></div>
  <div id="pages-wrap" class="pages-wrap hidden">
    <div class="result-toolbar">
      <div class="view-toggle">
        <button type="button" id="view-by-page" class="toggle-btn active">페이지 별</button>
        <button type="button" id="view-all" class="toggle-btn">전체 보기</button>
      </div>
      <button type="button" id="copy-btn" class="copy-btn">복사하기</button>
    </div>
    <div id="page-tabs" class="page-tabs"></div>
  </div>
  <div id="page-source-badge" class="page-source-badge hidden"></div>
  <div id="test-result-wrap" class="hidden">
    <div class="test-result-title" id="test-result-title">테스트 모드 결과</div>
    <div id="test-accuracy" class="accuracy-row"></div>
    <div id="diff-color-legend" class="diff-color-legend hidden">
      <span class="item"><span class="sample equal">일치</span> 정답(direct)과 OCR이 동일하게 인식</span>
      <span class="item"><span class="sample direct">정답</span> 초록: 정답(direct)에 있던 글자 (오인식 시 정답 쪽, 누락 시 OCR이 못 읽은 부분)</span>
      <span class="item"><span class="sample ocr">OCR</span> 빨간 취소선: OCR이 인식한 글자 (오인식 시 OCR 결과, 정답에 없는데 OCR만 읽은 부분)</span>
    </div>
    <div id="test-result-actions" class="test-result-actions hidden">
      <span class="test-view-toggle">
        <button type="button" id="test-view-diff" class="test-view-btn active">diff 보기</button>
        <button type="button" id="test-view-direct" class="test-view-btn">디지털 PDF 본</button>
        <button type="button" id="test-view-ocr" class="test-view-btn">OCR 본</button>
      </span>
      <button type="button" id="copy-diff-btn" class="copy-diff-btn">diff 결과 복사</button>
    </div>
  </div>
  <div id="result"></div>

  <script>
    var form = document.getElementById('form');
    var result = document.getElementById('result');
    var elapsedEl = document.getElementById('elapsed');
    var pagesWrap = document.getElementById('pages-wrap');
    var pageTabs = document.getElementById('page-tabs');
    var copyBtn = document.getElementById('copy-btn');
    var viewByPageBtn = document.getElementById('view-by-page');
    var viewAllBtn = document.getElementById('view-all');
    var uploadZone = document.getElementById('upload-zone');
    var fileInput = document.getElementById('file-input');
    var uploadHint = document.getElementById('upload-hint');
    var uploadFilename = document.getElementById('upload-filename');

    var currentPages = [];
    var droppedFile = null;
    var currentTestPageResults = null;
    var testResultWrap = document.getElementById('test-result-wrap');
    var testResultTitle = document.getElementById('test-result-title');
    var testAccuracy = document.getElementById('test-accuracy');
    var diffColorLegend = document.getElementById('diff-color-legend');
    var testResultActions = document.getElementById('test-result-actions');
    var copyDiffBtn = document.getElementById('copy-diff-btn');
    var testModeToggle = document.getElementById('test-mode-toggle');
    var pageSourceBadge = document.getElementById('page-source-badge');
    var testViewDiffBtn = document.getElementById('test-view-diff');
    var testViewDirectBtn = document.getElementById('test-view-direct');
    var testViewOcrBtn = document.getElementById('test-view-ocr');

    var currentTestViewMode = 'diff';

    function setUploadFile(file) {
      droppedFile = file;
      if (file) {
        uploadHint.classList.add('hidden');
        uploadFilename.textContent = file.name;
        uploadFilename.classList.remove('hidden');
      } else {
        uploadHint.classList.remove('hidden');
        uploadFilename.classList.add('hidden');
        uploadFilename.textContent = '';
      }
    }

    function handleDragOver(e) {
      e.preventDefault();
      e.stopPropagation();
      uploadZone.classList.add('dragover');
    }

    function handleDragLeave(e) {
      e.preventDefault();
      e.stopPropagation();
      uploadZone.classList.remove('dragover');
    }

    function handleDrop(e) {
      e.preventDefault();
      e.stopPropagation();
      uploadZone.classList.remove('dragover');
      var files = e.dataTransfer.files;
      if (!files.length) return;
      var file = files[0];
      if (!file.name.toLowerCase().endsWith('.pdf')) {
        result.textContent = 'PDF 파일만 업로드 가능합니다.';
        result.classList.add('error');
        return;
      }
      setUploadFile(file);
    }

    function handleUploadZoneClick() {
      fileInput.click();
    }

    function handleFileInputChange() {
      if (fileInput.files.length) {
        setUploadFile(fileInput.files[0]);
      } else {
        setUploadFile(null);
      }
    }

    var currentViewMode = 'page'; // 'page' | 'all'
    var currentPageIndex = 0;

    function getAllText() {
      if (!currentPages.length) return '';
      return currentPages.map(function (p) {
        return '--- 페이지 ' + p.page + ' ---\n' + (p.text || '(텍스트 없음)');
      }).join('\n\n');
    }

    function applyViewMode() {
      if (currentViewMode === 'all') {
        pageTabs.classList.add('hidden');
        result.classList.remove('diff-view');
        result.textContent = getAllText();
      } else {
        pageTabs.classList.remove('hidden');
        showPage(currentPageIndex);
      }
    }

    function handleViewByPageClick() {
      currentViewMode = 'page';
      viewByPageBtn.classList.add('active');
      viewAllBtn.classList.remove('active');
      applyViewMode();
    }

    function handleViewAllClick() {
      currentViewMode = 'all';
      viewAllBtn.classList.add('active');
      viewByPageBtn.classList.remove('active');
      applyViewMode();
    }

    function handleCopyClick() {
      var text = result.textContent || '';
      if (!text || text === '처리 중...' || text.startsWith('오류:')) return;
      navigator.clipboard.writeText(text).then(function () {
        var prev = copyBtn.textContent;
        copyBtn.textContent = '복사됨';
        setTimeout(function () { copyBtn.textContent = prev; }, 1500);
      }).catch(function () {
        copyBtn.textContent = '복사 실패';
        setTimeout(function () { copyBtn.textContent = '복사하기'; }, 1500);
      });
    }

    function buildDiffCopyText(pageResults, pageIndex) {
      if (!pageResults || !pageResults.length) return '';
      var pr = pageResults[pageIndex] != null ? pageResults[pageIndex] : pageResults[0];
      var acc = pr.accuracy || {};
      var total = pr.total || {};
      var correct = pr.correct || {};
      var lines = [];
      lines.push('[인식률 결과]');
      if (acc.hangul != null) lines.push('한글 ' + acc.hangul + '% (' + (correct.hangul || 0) + '/' + (total.hangul || 0) + ')');
      if (acc.digit != null) lines.push('숫자 ' + acc.digit + '% (' + (correct.digit || 0) + '/' + (total.digit || 0) + ')');
      if (acc.alpha != null) lines.push('영어 ' + acc.alpha + '% (' + (correct.alpha || 0) + '/' + (total.alpha || 0) + ')');
      if (lines.length === 1) lines.push('(비교할 문자 없음)');
      lines.push('');
      lines.push('[direct 본]');
      lines.push(pr.direct_text != null ? pr.direct_text : '');
      lines.push('');
      lines.push('[OCR 본]');
      lines.push(pr.ocr_text != null ? pr.ocr_text : '');
      return lines.join('\n');
    }

    function handleCopyDiffClick() {
      if (!currentTestPageResults || !currentTestPageResults.length) return;
      var text = buildDiffCopyText(currentTestPageResults, currentPageIndex);
      if (!text) return;
      navigator.clipboard.writeText(text).then(function () {
        var prev = copyDiffBtn.textContent;
        copyDiffBtn.textContent = '복사됨';
        setTimeout(function () { copyDiffBtn.textContent = prev; }, 1500);
      }).catch(function () {
        copyDiffBtn.textContent = '복사 실패';
        setTimeout(function () { copyDiffBtn.textContent = 'diff 결과 복사'; }, 1500);
      });
    }

    function renderTestModeResult(isTestMode, directAvailable, pageResults, pageIndex) {
      if (!testResultWrap) return;
      if (!isTestMode) {
        testResultWrap.classList.add('hidden');
        if (testResultActions) testResultActions.classList.add('hidden');
        if (diffColorLegend) diffColorLegend.classList.add('hidden');
        return;
      }
      testResultWrap.classList.remove('hidden');
      if (!directAvailable || !pageResults || !pageResults.length) {
        testResultTitle.textContent = '테스트 모드: direct 추출 불가 (스캔본 또는 텍스트 레이어 없음)';
        testAccuracy.innerHTML = '';
        if (testResultActions) testResultActions.classList.add('hidden');
        if (diffColorLegend) diffColorLegend.classList.add('hidden');
        return;
      }
      if (testResultActions) testResultActions.classList.remove('hidden');
      if (diffColorLegend) diffColorLegend.classList.remove('hidden');
      var pr = pageResults[pageIndex] || pageResults[0];
      testResultTitle.textContent = '테스트 모드: 인식 정확도 (페이지 ' + pr.page + ')';
      var acc = pr.accuracy || {};
      var total = pr.total || {};
      var html = '';
      if (acc.hangul != null) {
        html += '<span class="accuracy-item">한글 <span class="value">' + acc.hangul + '%</span> (' + (pr.correct && pr.correct.hangul) + '/' + total.hangul + ')</span>';
      }
      if (acc.digit != null) {
        html += '<span class="accuracy-item">숫자 <span class="value">' + acc.digit + '%</span> (' + (pr.correct && pr.correct.digit) + '/' + total.digit + ')</span>';
      }
      if (acc.alpha != null) {
        html += '<span class="accuracy-item">영어 <span class="value">' + acc.alpha + '%</span> (' + (pr.correct && pr.correct.alpha) + '/' + total.alpha + ')</span>';
      }
      if (!html) html = '<span class="accuracy-item">(비교할 문자 없음)</span>';
      testAccuracy.innerHTML = html;
    }

    function renderDiffSegments(container, segments) {
      if (!container) return;
      container.innerHTML = '';
      if (!segments || !segments.length) {
        container.textContent = '(차이 없음)';
        return;
      }
      segments.forEach(function (seg) {
        if (seg.type === 'equal') {
          var s = document.createElement('span');
          s.className = 'diff-equal';
          s.textContent = seg.text || '';
          container.appendChild(s);
        } else if (seg.type === 'replace') {
          var wrap = document.createElement('span');
          var sd = document.createElement('span');
          sd.className = 'diff-direct';
          sd.textContent = seg.direct || '';
          var so = document.createElement('span');
          so.className = 'diff-ocr';
          so.textContent = seg.ocr || '';
          wrap.appendChild(sd);
          wrap.appendChild(so);
          container.appendChild(wrap);
        } else if (seg.type === 'insert') {
          var si = document.createElement('span');
          si.className = 'diff-insert';
          si.textContent = seg.ocr || '';
          container.appendChild(si);
        } else if (seg.type === 'delete') {
          var sd = document.createElement('span');
          sd.className = 'diff-delete';
          sd.textContent = seg.direct || '';
          container.appendChild(sd);
        }
      });
    }

    function setTestViewMode(mode) {
      currentTestViewMode = mode;
      if (testViewDiffBtn) testViewDiffBtn.classList.toggle('active', mode === 'diff');
      if (testViewDirectBtn) testViewDirectBtn.classList.toggle('active', mode === 'direct');
      if (testViewOcrBtn) testViewOcrBtn.classList.toggle('active', mode === 'ocr');
      showPage(currentPageIndex);
    }

    function showPage(index) {
      currentPageIndex = index;
      if (!currentPages[index]) return;
      var p = currentPages[index];
      var pr = currentTestPageResults && currentTestPageResults[index] ? currentTestPageResults[index] : null;
      var hasTestResult = pr && currentTestPageResults && currentTestPageResults.length > 0;
      var showDiff = hasTestResult && currentTestViewMode === 'diff' && pr.diff_segments && pr.diff_segments.length > 0;

      if (hasTestResult && currentTestViewMode === 'direct') {
        result.classList.remove('diff-view');
        result.textContent = (pr.direct_text != null ? pr.direct_text : '') || '(텍스트 없음)';
      } else if (hasTestResult && currentTestViewMode === 'ocr') {
        result.classList.remove('diff-view');
        result.textContent = (pr.ocr_text != null ? pr.ocr_text : '') || '(텍스트 없음)';
      } else if (showDiff) {
        result.classList.add('diff-view');
        result.innerHTML = '';
        var legend = document.createElement('div');
        legend.className = 'diff-legend';
        legend.textContent = '아래 글자색 의미: 검정=일치, 초록=정답(direct) 쪽, 빨간 취소선=OCR 쪽 (상단 범례 참고)';
        result.appendChild(legend);
        renderDiffSegments(result, pr.diff_segments);
      } else {
        result.classList.remove('diff-view');
        result.textContent = p.text || '(텍스트 없음)';
      }

      if (pageSourceBadge) {
        if (p.source === 'direct') {
          pageSourceBadge.textContent = '이 페이지: direct 추출 (PDF 텍스트 레이어)';
          pageSourceBadge.className = 'page-source-badge direct';
          pageSourceBadge.classList.remove('hidden');
        } else if (p.source === 'ocr') {
          pageSourceBadge.textContent = '이 페이지: OCR 추출';
          pageSourceBadge.className = 'page-source-badge ocr';
          pageSourceBadge.classList.remove('hidden');
        } else {
          pageSourceBadge.classList.add('hidden');
        }
      }
      var buttons = pageTabs.querySelectorAll('button');
      buttons.forEach(function (btn, i) {
        btn.classList.toggle('active', i === index);
      });
      if (currentTestPageResults && currentTestPageResults.length) {
        renderTestModeResult(true, true, currentTestPageResults, index);
      }
    }

    function renderPageTabs(pages) {
      currentPages = pages;
      currentViewMode = 'page';
      viewByPageBtn.classList.add('active');
      viewAllBtn.classList.remove('active');
      pageTabs.classList.remove('hidden');
      pageTabs.innerHTML = '';
      pages.forEach(function (p, i) {
        var btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'page-tab' + (i === 0 ? ' active' : '');
        btn.textContent = p.source ? p.page + ' (' + p.source + ')' : p.page;
        btn.addEventListener('click', function () { showPage(i); });
        pageTabs.appendChild(btn);
      });
      pagesWrap.classList.remove('hidden');
      showPage(0);
    }

    function hidePageTabs() {
      pagesWrap.classList.add('hidden');
      pageTabs.innerHTML = '';
      currentPages = [];
      currentTestPageResults = null;
      if (testResultWrap) testResultWrap.classList.add('hidden');
      if (pageSourceBadge) pageSourceBadge.classList.add('hidden');
    }

    function handleSubmit(e) {
      e.preventDefault();
      var file = droppedFile || (fileInput.files.length ? fileInput.files[0] : null);
      if (!file) {
        result.textContent = 'PDF 파일을 선택하거나 영역에 놓아 주세요.';
        result.classList.add('error');
        return;
      }
      elapsedEl.textContent = '';
      hidePageTabs();
      result.textContent = '처리 중...';
      result.classList.remove('error');

      var fd = new FormData();
      fd.append('file', file);
      fd.append('test_mode', testModeToggle.checked ? 'true' : 'false');

      var startMs = Date.now();
      var timerId = setInterval(function () {
        var sec = Math.floor((Date.now() - startMs) / 1000);
        elapsedEl.textContent = '경과 시간: ' + sec + '초';
      }, 100);

      function stopTimer() {
        clearInterval(timerId);
      }

      function formatElapsed(data) {
        var parts = [];
        var clientSec = Math.floor((Date.now() - startMs) / 1000);
        parts.push('경과 시간: ' + clientSec + '초');
        if (data.total_elapsed_sec != null && data.avg_sec_per_page != null && data.total_pages > 0) {
          parts.push('페이지당 평균: ' + data.avg_sec_per_page + '초 (' + data.total_pages + '페이지)');
        }
        if (data.overall_accuracy && data.overall_accuracy.overall != null) {
          var oa = data.overall_accuracy;
          var accParts = ['전체 평균 인식률: ' + oa.overall + '%'];
          if (oa.hangul != null) accParts.push('한글 ' + oa.hangul + '%');
          if (oa.digit != null) accParts.push('숫자 ' + oa.digit + '%');
          if (oa.alpha != null) accParts.push('영어 ' + oa.alpha + '%');
          parts.push(accParts.join(' | '));
        }
        return parts.join(' · ');
      }

      fetch('/api/ocr', { method: 'POST', body: fd })
        .then(function (r) { return r.json(); })
        .then(function (data) {
          stopTimer();

          if (data.ok && data.pages && data.pages.length) {
            elapsedEl.textContent = formatElapsed(data);
            currentTestPageResults = data.test_mode && data.page_results ? data.page_results : null;
            renderPageTabs(data.pages);
            renderTestModeResult(!!data.test_mode, !!data.direct_available, currentTestPageResults, 0);
          } else if (data.ok && data.pages && data.pages.length === 0) {
            currentTestPageResults = null;
            testResultWrap.classList.add('hidden');
            result.textContent = '(추출된 페이지 없음)';
            elapsedEl.textContent = formatElapsed(data);
          } else {
            currentTestPageResults = null;
            testResultWrap.classList.add('hidden');
            elapsedEl.textContent = '경과 시간: ' + Math.floor((Date.now() - startMs) / 1000) + '초';
            result.textContent = '오류: ' + (data.error || '알 수 없음');
            result.classList.add('error');
          }
        })
        .catch(function (err) {
          stopTimer();
          elapsedEl.textContent = '경과 시간: ' + Math.floor((Date.now() - startMs) / 1000) + '초';
          result.textContent = '오류: ' + err.message;
          result.classList.add('error');
        });
    }

    uploadZone.addEventListener('click', handleUploadZoneClick);
    uploadZone.addEventListener('dragover', handleDragOver);
    uploadZone.addEventListener('dragleave', handleDragLeave);
    uploadZone.addEventListener('drop', handleDrop);
    fileInput.addEventListener('change', handleFileInputChange);

    viewByPageBtn.addEventListener('click', handleViewByPageClick);
    viewAllBtn.addEventListener('click', handleViewAllClick);
    copyBtn.addEventListener('click', handleCopyClick);
    if (copyDiffBtn) copyDiffBtn.addEventListener('click', handleCopyDiffClick);
    if (testViewDiffBtn) testViewDiffBtn.addEventListener('click', function () { setTestViewMode('diff'); });
    if (testViewDirectBtn) testViewDirectBtn.addEventListener('click', function () { setTestViewMode('direct'); });
    if (testViewOcrBtn) testViewOcrBtn.addEventListener('click', function () { setTestViewMode('ocr'); });
    form.addEventListener('submit', handleSubmit);
  </script>
</body>
</html>
