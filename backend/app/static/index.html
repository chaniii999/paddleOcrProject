<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>의회문서 OCR 테스트</title>
  <style>
    body { font-family: sans-serif; max-width: 640px; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.25rem; }
    form { display: flex; flex-direction: column; gap: 1rem; }
    .upload-zone { border: 2px dashed #ccc; border-radius: 8px; padding: 2rem; text-align: center; cursor: pointer; transition: border-color 0.2s, background 0.2s; }
    .upload-zone:hover { border-color: #06c; background: #f8fbff; }
    .upload-zone.dragover { border-color: #06c; background: #e6f2ff; }
    .upload-zone .upload-hint { color: #666; font-size: 0.9rem; }
    .upload-zone .upload-filename { color: #06c; font-size: 0.9rem; margin-top: 0.5rem; }
    input[type="file"] { display: none; }
    button { padding: 0.5rem 1rem; cursor: pointer; }
    .elapsed { margin-top: 1rem; font-size: 0.9rem; color: #666; }
    .pages-wrap { display: flex; flex-direction: column; gap: 0.5rem; margin-top: 1rem; }
    .pages-wrap.hidden { display: none; }
    .result-toolbar { display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; flex-wrap: wrap; }
    .view-toggle { display: flex; gap: 0; border: 1px solid #ccc; border-radius: 4px; overflow: hidden; }
    .toggle-btn { padding: 0.4rem 0.75rem; border: none; background: #fff; color: #666; cursor: pointer; font-size: 0.9rem; }
    .toggle-btn:hover { background: #f0f0f0; }
    .toggle-btn.active { background: #06c; color: #fff; }
    .pages-label { font-size: 0.9rem; color: #666; margin: 0; }
    .copy-btn { padding: 0.4rem 0.75rem; border: 1px solid #06c; background: #fff; color: #06c; border-radius: 4px; cursor: pointer; font-size: 0.9rem; }
    .copy-btn:hover { background: #e6f2ff; }
    .page-tabs { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .page-tabs.hidden { display: none; }
    .page-tab { padding: 0.4rem 0.75rem; border: 1px solid #ccc; background: #fff; border-radius: 4px; cursor: pointer; font-size: 0.9rem; }
    .page-tab:hover { background: #f0f0f0; }
    .page-tab.active { background: #06c; color: #fff; border-color: #06c; }
    #result { margin-top: 0.5rem; white-space: pre-wrap; background: #f5f5f5; padding: 1rem; border-radius: 4px; min-height: 4rem; }
    .error { color: #c00; }
    .hidden { display: none; }
    a { color: #06c; }
  </style>
</head>
<body>
  <h1>의회문서 OCR</h1>
  <form id="form">
    <div id="upload-zone" class="upload-zone">
      <p class="upload-hint" id="upload-hint">PDF를 여기에 놓거나 클릭하여 선택</p>
      <p class="upload-filename hidden" id="upload-filename"></p>
      <input type="file" name="file" id="file-input" accept=".pdf">
    </div>
    <button type="submit">텍스트 추출</button>
  </form>
  <div id="elapsed" class="elapsed"></div>
  <div id="pages-wrap" class="pages-wrap hidden">
    <div class="result-toolbar">
      <div class="view-toggle">
        <button type="button" id="view-by-page" class="toggle-btn active">페이지 별</button>
        <button type="button" id="view-all" class="toggle-btn">전체 보기</button>
      </div>
      <button type="button" id="copy-btn" class="copy-btn">복사하기</button>
    </div>
    <div id="page-tabs" class="page-tabs"></div>
  </div>
  <div id="result"></div>

  <script>
    var form = document.getElementById('form');
    var result = document.getElementById('result');
    var elapsedEl = document.getElementById('elapsed');
    var pagesWrap = document.getElementById('pages-wrap');
    var pageTabs = document.getElementById('page-tabs');
    var copyBtn = document.getElementById('copy-btn');
    var viewByPageBtn = document.getElementById('view-by-page');
    var viewAllBtn = document.getElementById('view-all');
    var uploadZone = document.getElementById('upload-zone');
    var fileInput = document.getElementById('file-input');
    var uploadHint = document.getElementById('upload-hint');
    var uploadFilename = document.getElementById('upload-filename');

    var currentPages = [];
    var droppedFile = null;

    function setUploadFile(file) {
      droppedFile = file;
      if (file) {
        uploadHint.classList.add('hidden');
        uploadFilename.textContent = file.name;
        uploadFilename.classList.remove('hidden');
      } else {
        uploadHint.classList.remove('hidden');
        uploadFilename.classList.add('hidden');
        uploadFilename.textContent = '';
      }
    }

    function handleDragOver(e) {
      e.preventDefault();
      e.stopPropagation();
      uploadZone.classList.add('dragover');
    }

    function handleDragLeave(e) {
      e.preventDefault();
      e.stopPropagation();
      uploadZone.classList.remove('dragover');
    }

    function handleDrop(e) {
      e.preventDefault();
      e.stopPropagation();
      uploadZone.classList.remove('dragover');
      var files = e.dataTransfer.files;
      if (!files.length) return;
      var file = files[0];
      if (!file.name.toLowerCase().endsWith('.pdf')) {
        result.textContent = 'PDF 파일만 업로드 가능합니다.';
        result.classList.add('error');
        return;
      }
      setUploadFile(file);
    }

    function handleUploadZoneClick() {
      fileInput.click();
    }

    function handleFileInputChange() {
      if (fileInput.files.length) {
        setUploadFile(fileInput.files[0]);
      } else {
        setUploadFile(null);
      }
    }

    var currentViewMode = 'page'; // 'page' | 'all'
    var currentPageIndex = 0;

    function getAllText() {
      if (!currentPages.length) return '';
      return currentPages.map(function (p) {
        return '--- 페이지 ' + p.page + ' ---\n' + (p.text || '(텍스트 없음)');
      }).join('\n\n');
    }

    function applyViewMode() {
      if (currentViewMode === 'all') {
        pageTabs.classList.add('hidden');
        result.textContent = getAllText();
      } else {
        pageTabs.classList.remove('hidden');
        showPage(currentPageIndex);
      }
    }

    function handleViewByPageClick() {
      currentViewMode = 'page';
      viewByPageBtn.classList.add('active');
      viewAllBtn.classList.remove('active');
      applyViewMode();
    }

    function handleViewAllClick() {
      currentViewMode = 'all';
      viewAllBtn.classList.add('active');
      viewByPageBtn.classList.remove('active');
      applyViewMode();
    }

    function handleCopyClick() {
      var text = result.textContent || '';
      if (!text || text === '처리 중...' || text.startsWith('오류:')) return;
      navigator.clipboard.writeText(text).then(function () {
        var prev = copyBtn.textContent;
        copyBtn.textContent = '복사됨';
        setTimeout(function () { copyBtn.textContent = prev; }, 1500);
      }).catch(function () {
        copyBtn.textContent = '복사 실패';
        setTimeout(function () { copyBtn.textContent = '복사하기'; }, 1500);
      });
    }

    function showPage(index) {
      currentPageIndex = index;
      if (!currentPages[index]) return;
      var p = currentPages[index];
      result.textContent = p.text || '(텍스트 없음)';
      var buttons = pageTabs.querySelectorAll('button');
      buttons.forEach(function (btn, i) {
        btn.classList.toggle('active', i === index);
      });
    }

    function renderPageTabs(pages) {
      currentPages = pages;
      currentViewMode = 'page';
      viewByPageBtn.classList.add('active');
      viewAllBtn.classList.remove('active');
      pageTabs.classList.remove('hidden');
      pageTabs.innerHTML = '';
      pages.forEach(function (p, i) {
        var btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'page-tab' + (i === 0 ? ' active' : '');
        btn.textContent = p.page;
        btn.addEventListener('click', function () { showPage(i); });
        pageTabs.appendChild(btn);
      });
      pagesWrap.classList.remove('hidden');
      showPage(0);
    }

    function hidePageTabs() {
      pagesWrap.classList.add('hidden');
      pageTabs.innerHTML = '';
      currentPages = [];
    }

    function handleSubmit(e) {
      e.preventDefault();
      var file = droppedFile || (fileInput.files.length ? fileInput.files[0] : null);
      if (!file) {
        result.textContent = 'PDF 파일을 선택하거나 영역에 놓아 주세요.';
        result.classList.add('error');
        return;
      }
      elapsedEl.textContent = '';
      hidePageTabs();
      result.textContent = '처리 중...';
      result.classList.remove('error');

      var fd = new FormData();
      fd.append('file', file);

      var startMs = Date.now();
      var timerId = setInterval(function () {
        var sec = Math.floor((Date.now() - startMs) / 1000);
        elapsedEl.textContent = '경과 시간: ' + sec + '초';
      }, 100);

      function stopTimer() {
        clearInterval(timerId);
        var sec = Math.floor((Date.now() - startMs) / 1000);
        elapsedEl.textContent = '경과 시간: ' + sec + '초';
      }

      fetch('/api/ocr', { method: 'POST', body: fd })
        .then(function (r) { return r.json(); })
        .then(function (data) {
          stopTimer();

          if (data.ok && data.pages && data.pages.length) {
            renderPageTabs(data.pages);
          } else if (data.ok && data.pages && data.pages.length === 0) {
            result.textContent = '(추출된 페이지 없음)';
          } else {
            result.textContent = '오류: ' + (data.error || '알 수 없음');
            result.classList.add('error');
          }
        })
        .catch(function (err) {
          stopTimer();
          result.textContent = '오류: ' + err.message;
          result.classList.add('error');
        });
    }

    uploadZone.addEventListener('click', handleUploadZoneClick);
    uploadZone.addEventListener('dragover', handleDragOver);
    uploadZone.addEventListener('dragleave', handleDragLeave);
    uploadZone.addEventListener('drop', handleDrop);
    fileInput.addEventListener('change', handleFileInputChange);

    viewByPageBtn.addEventListener('click', handleViewByPageClick);
    viewAllBtn.addEventListener('click', handleViewAllClick);
    copyBtn.addEventListener('click', handleCopyClick);
    form.addEventListener('submit', handleSubmit);
  </script>
</body>
</html>
