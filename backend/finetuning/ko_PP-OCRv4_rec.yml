# PP-OCRv4 Recognition 파인튜닝 설정 (Colab T4 4GB 최적화)
# - batch_size_per_card: 16 (4GB VRAM)
# - learning_rate: 5e-5 (파인튜닝 권장)
# - save_model_dir: 구글 드라이브 경로 (런타임 끊김 시 이어서 학습)

Global:
  model_name: PP-OCRv4_mobile_rec
  debug: false
  use_gpu: true
  epoch_num: 200
  log_smooth_window: 20
  print_batch_step: 10
  # 구글 드라이브 마운트 후 경로 (예: /content/drive/MyDrive/paddleocr_finetune/output)
  save_model_dir: /content/drive/MyDrive/paddleocr_finetune/output/rec_ppocr_v4
  save_epoch_step: 5
  eval_batch_step: [0, 500]
  cal_metric_during_train: true
  # 사전학습 모델 (PP-OCRv4 Korean 다운로드 후 경로 지정)
  pretrained_model:
  # 이어서 학습 시 체크포인트 경로 (예: /content/drive/MyDrive/paddleocr_finetune/output/rec_ppocr_v4/latest)
  checkpoints:
  save_inference_dir:
  use_visualdl: false
  infer_img: doc/imgs_words/ch/word_1.jpg
  # 한국어: ppocr/utils/dict/korean_dict.txt 또는 PaddleOCR 설치 경로 내 dict
  character_dict_path: ppocr/utils/dict/korean_dict.txt
  max_text_length: &max_text_length 25
  infer_mode: false
  use_space_char: true
  distributed: false
  save_res_path: ./output/rec/predicts_ppocrv4.txt
  d2s_train_image_shape: [3, 48, 320]

Optimizer:
  name: Adam
  beta1: 0.9
  beta2: 0.999
  lr:
    name: Cosine
    learning_rate: 0.00005  # 5e-5, T4 4GB + batch 16 파인튜닝
    warmup_epoch: 3
  regularizer:
    name: L2
    factor: 3.0e-05

Architecture:
  model_type: rec
  algorithm: SVTR_LCNet
  Transform:
  Backbone:
    name: PPLCNetV3
    scale: 0.95
  Head:
    name: MultiHead
    head_list:
    - CTCHead:
  Neck:
    name: svtr
    dims: 120
    depth: 2
    hidden_dims: 120
    kernel_size: [1, 3]
    use_guide: True
  Head:
    fc_decay: 0.00001
  - NRTRHead:
    nrtr_dim: 384
    max_text_length: *max_text_length

Loss:
  name: MultiLoss
  loss_config_list:
  - CTCLoss:
  - NRTRLoss:

PostProcess:
  name: CTCLabelDecode

Metric:
  name: RecMetric
  main_indicator: acc

Train:
  dataset:
    name: SimpleDataSet
    data_dir: ./train_data
    label_file_list:
    - ./train_data/train_list.txt
    ratio_list: [1.0]
    transforms:
    - DecodeImage:
        img_mode: BGR
        channel_first: false
    - RecResizeImg:
        image_shape: [3, 48, 320]
    - MultiLabelEncode:
        gtc_encode: NRTRLabelEncode
    - KeepKeys:
        keep_keys:
        - image
        - label_ctc
        - label_gtc
        - length
        - valid_ratio
  loader:
    shuffle: true
    batch_size_per_card: 16  # T4 4GB
    drop_last: true
    num_workers: 4

Eval:
  dataset:
    name: SimpleDataSet
    data_dir: ./train_data
    label_file_list:
    - ./train_data/val_list.txt
    transforms:
    - DecodeImage:
        img_mode: BGR
        channel_first: false
    - RecResizeImg:
        image_shape: [3, 48, 320]
    - MultiLabelEncode:
        gtc_encode: NRTRLabelEncode
    - KeepKeys:
        keep_keys:
        - image
        - label_ctc
        - label_gtc
        - length
        - valid_ratio
  loader:
    shuffle: false
    drop_last: false
    batch_size_per_card: 16
    num_workers: 2
